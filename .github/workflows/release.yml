name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            artifact_name: ZRTCK-linux-x64
          - runtime: linux-arm64
            artifact_name: ZRTCK-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ZRTCK.InventoryManagement/ZRTCK.InventoryManagement.csproj

      - name: Publish self-contained executable
        run: |
          dotnet publish ZRTCK.InventoryManagement/ZRTCK.InventoryManagement.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -o ./publish/${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.runtime }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare assets for release
        run: |
          mkdir ./release-assets
          # The output from dotnet publish -p:PublishSingleFile=true is usually ZRTCK.InventoryManagement (the project name)
          # We'll find it in the downloaded artifact directory and copy it with the desired name.
          
          find ./artifacts/ZRTCK-linux-x64 -name "ZRTCK.InventoryManagement" -exec cp {} ./release-assets/ZRTCK-linux-x64 \;
          find ./artifacts/ZRTCK-linux-arm64 -name "ZRTCK.InventoryManagement" -exec cp {} ./release-assets/ZRTCK-linux-arm64 \;

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/ZRTCK-linux-x64
            ./release-assets/ZRTCK-linux-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
