name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            artifact_name: ZRTCK-linux-x64
          - runtime: linux-arm64
            artifact_name: ZRTCK-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ZRTCK.InventoryManagement/ZRTCK.InventoryManagement.csproj

      - name: Publish self-contained executable
        run: |
          dotnet publish ZRTCK.InventoryManagement/ZRTCK.InventoryManagement.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o ./publish/${{ matrix.runtime }}

      - name: Archive publish directory
        run: |
          tar -czf ${{ matrix.artifact_name }}.tar.gz -C ./publish/${{ matrix.runtime }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/ZRTCK-linux-x64.tar.gz
            ./artifacts/ZRTCK-linux-arm64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
